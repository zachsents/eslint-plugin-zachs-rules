name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Use latest npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Check package version is unpublished
        run: |
          PACKAGE_VERSION="$(node -p "const p = require('./package.json'); `${p.name}@${p.version}`")"
          if npm view "$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
